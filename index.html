      <h1>Rohy — Suivi de dépenses partagées entre amis</h1>
      <p>Rohy simplifie le partage des dépenses entre amis, en famille ou en voyage, même lorsque certains participants paient pour leurs enfants, leur conjoint, ou ne participent qu'à certaines dépenses. Application gratuite, sans installation, faite à Madagascar et utilisée dans toute l'Afrique.</p>

      <h2>Le problème</h2>
      <p>Les dépenses de groupe sont rarement aussi simples qu'un partage égal : un parent paie pour ses enfants, un couple partage certaines dépenses, certaines personnes participent à une activité et d'autres non, tout le monde ne contribue pas de la même manière. Rohy a été conçu pour gérer ces situations naturellement.</p>

      <h2>Fonctionnalités principales</h2>
      <ul>
        <li><strong>Gestion des groupes</strong> — créez autant de groupes que nécessaire.</li>
        <li><strong>Répartition flexible</strong> — parts, demi-parts et contributions personnalisées.</li>
        <li><strong>Dépenses ciblées</strong> — sélectionnez précisément les participants concernés par chaque dépense.</li>
        <li><strong>Consolidation par foyer</strong> — les membres d'un même foyer apparaissent en une seule ligne de solde.</li>
        <li><strong>Historique complet</strong> — retrouvez, recherchez et filtrez toutes les dépenses et remboursements.</li>
        <li><strong>Scan intelligent des tickets</strong> — ajoutez rapidement une dépense à partir d'une photo.</li>
        <li><strong>Suivi des remboursements</strong> — gardez une vue claire des règlements effectués.</li>
        <li><strong>Lien d'invitation</strong> — invitez sans obliger vos proches à créer un compte.</li>
        <li><strong>Devises et mobile money africains</strong> — Ariary, francs CFA, Mvola, Orange Money, Airtel Money.</li>
        <li><strong>Export de vos données</strong> — téléchargez les dépenses et soldes d'un groupe en CSV, Excel ou PDF.</li>
        <li><strong>Rappels automatiques</strong> — envoyez un rappel, dans l'app et par e-mail, à qui vous doit encore de l'argent.</li>
        <li><strong>Simplification des dettes</strong> — Rohy regroupe les soldes entre tous vos groupes communs pour réduire le nombre de règlements.</li>
        <li><strong>Conversion de devise</strong> — payez une dépense dans une autre devise que celle du groupe, le taux se pré-remplit automatiquement et reste modifiable.</li>
      </ul>

      <table border="1" cellpadding="6" style="border-collapse:collapse">
        <thead><tr><th></th><th>Rohy</th><th>Concurrents</th></tr></thead>
        <tbody>
          <tr><td>Répartition classique</td><td>✓</td><td>✓</td></tr>
          <tr><td>Demi-parts</td><td>✓</td><td>Rare</td></tr>
          <tr><td>Enfants et personnes à charge</td><td>✓</td><td>Rare</td></tr>
          <tr><td>Contributions personnalisées</td><td>✓</td><td>Limité</td></tr>
          <tr><td>Dépenses ciblées</td><td>✓</td><td>Limité</td></tr>
          <tr><td>Suivi des remboursements</td><td>✓</td><td>✓</td></tr>
        </tbody>
      </table>

      <h2>Cas d'usage</h2>
      <p>Vacances en famille, événements familiaux (mariage, baptême, cérémonie religieuse, cotisation d'association — comité familial, participations inégales entre foyers), colocations, voyages entre amis.</p>

      <h2>Questions fréquentes</h2>
      <p><strong>Rohy est-il gratuit ?</strong> Oui. Vous pouvez créer des groupes et gérer vos dépenses gratuitement.</p>
      <p><strong>Dois-je installer une application ?</strong> Non. Rohy fonctionne directement depuis votre navigateur.</p>
      <p><strong>Puis-je l'utiliser sur mobile ?</strong> Oui. Rohy est optimisé pour les smartphones, tablettes et ordinateurs.</p>
      <p><strong>Puis-je gérer des demi-parts ?</strong> Oui. Rohy a été conçu pour gérer les contributions inégales, les enfants et les personnes à charge.</p>
      <p><strong>Mes données sont-elles sécurisées ?</strong> Oui. Vos données sont stockées de manière sécurisée et ne sont accessibles qu'aux membres de vos groupes.</p>

      <h2>Le sens de Rohy</h2>
      <p>Rohy signifie « lien » en malgache. Parce qu'au-delà des dépenses, ce sont les liens entre les personnes qui comptent. Les comptes s'équilibrent. Les liens restent.</p>
